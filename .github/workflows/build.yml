name: Build and Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        build-tools: 35.0.0
        ndk: 25.1.8937393

    - name: Grant execute permission for gradlew
      run: chmod +x ./android_app/gradlew

    - name: Build with Gradle
      run: cd android_app && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android_app/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 36
        build-tools: 35.0.0
        ndk: 25.1.8937393

    - name: Grant execute permission for gradlew
      run: chmod +x ./android_app/gradlew

    - name: Build with Gradle
      run: cd android_app && ./gradlew assembleRelease
      env:
        JREMOTE_KEY: ${{ secrets.JREMOTE_KEY }}

    - name: Upload Release APK
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: android_app/app/build/outputs/apk/release/app-release.apk