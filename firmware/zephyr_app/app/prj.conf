# JRemote Controller - Zephyr Configuration
# ESP32-S3 Configuration

# Enable console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Shell (for debugging)
CONFIG_SHELL=y

# SPI
CONFIG_SPI=y

# LED Strip (WS2812 via SPI)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y
