# JRemote Controller - Zephyr Configuration
# ESP32-S3 Configuration

# Enable console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Shell (for debugging)
CONFIG_SHELL=y

# SPI
CONFIG_SPI=y

# LED Strip (WS2812 via SPI)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y

CONFIG_BT=y
CONFIG_BT_HOST_CRYPTO=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# BLE role
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="JRemote"
CONFIG_BT_MAX_CONN=1

# C++ static initialization
CONFIG_STATIC_INIT_GNU=y