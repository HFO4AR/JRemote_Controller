# JRemote Controller - Zephyr Configuration
# ESP32-S3 Configuration

# Enable console
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# UART
CONFIG_UART_ASYNC_API=y
CONFIG_UART_INTERRUPT_DRIVEN=n

# DMA
CONFIG_DMA=n

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Shell (for debugging)
CONFIG_SHELL=y

# SPI
CONFIG_SPI=y

# LED Strip (WS2812 via SPI)
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y

CONFIG_BT=y
CONFIG_BT_HOST_CRYPTO=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y

# BLE role
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="JRemote"
CONFIG_BT_MAX_CONN=1

# BLE GATT
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_NOTIFY_MULTIPLE=y

# BLE Data Length Extension (DLE)
CONFIG_BT_DATA_LEN_UPDATE=y
CONFIG_BT_AUTO_DATA_LEN_UPDATE=y

# BLE PHY Update (optional, for better range/speed)
CONFIG_BT_PHY_UPDATE=y
CONFIG_BT_AUTO_PHY_UPDATE=y

# BLE Security (optional)
CONFIG_BT_SMP=y
CONFIG_BT_SMP_SC_PAIR_ONLY=y

# BLE buffers
CONFIG_BT_L2CAP_TX_MTU=517
CONFIG_BT_BUF_ACL_RX_SIZE=517
CONFIG_BT_BUF_ACL_TX_SIZE=517

# C++ static initialization
CONFIG_STATIC_INIT_GNU=y